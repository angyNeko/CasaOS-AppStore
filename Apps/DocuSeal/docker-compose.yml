name: docuseal
services:
  app:
    image: docuseal/docuseal:latest
    container_name: docuseal-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - target: 3000
        published: "20766"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/docuseal
        target: /data/docuseal
    environment:
      - TZ=$TZ
      # Links this container to the postgres container below
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/docuseal
    
    x-casaos:
      ports:
        - container: "3000"
          description:
            en_US: WebUI HTTP Port
      volumes:
        - container: /data/docuseal
          description:
            en_US: DocuSeal AppData

  postgres:
    image: postgres:18
    container_name: docuseal-postgres
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/pg_data
        target: /var/lib/postgresql/18/docker
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=docuseal
      - TZ=$TZ
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      
    x-casaos:
      volumes:
        - container: /var/lib/postgresql/18/docker
          description:
            en_US: PostgreSQL Database Data

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: app # Tells ZimaOS which container runs the web UI
  author: angyNeko
  category: Office
  description:
    en_US: DocuSeal is an open-source platform that provides secure and efficient digital document signing. This version utilizes a robust PostgreSQL database for higher performance.
  developer: DocuSeal
  icon: https://github.com/docusealco/docuseal/blob/master/public/favicon.svg
  tagline:
    en_US: Open-source DocuSign alternative.
  title:
    en_US: DocuSeal
  index: /
  port_map: "20766"